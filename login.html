<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Toska - Iniciar Sesión</title>
    <meta name="description" content="Iniciar sesión en el panel de administración de La Toska">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Identity Services -->
    <!-- ⚠️ IMPORTANTE: Reemplazá TU_GOOGLE_CLIENT_ID con tu Client ID real -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <!-- Contenedor oculto para el botón real de Google (se renderiza por JS) -->
    <div id="google-btn-hidden" style="position:absolute;width:0;height:0;overflow:hidden;"></div>

    <div class="login-page">
        <!-- Decorative circles -->
        <div class="decor-circle"></div>
        <div class="decor-circle"></div>
        <div class="decor-circle"></div>

        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-text">la toska</div>
            </div>
            <p class="login-subtitle">Panel de Administración</p>

            <!-- Tab Switcher -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="form-login-container" id="tab-login">Iniciar Sesión</button>
                <button class="auth-tab" data-tab="form-register-container" id="tab-register">Registrarse</button>
            </div>

            <!-- ========== LOGIN FORM ========== -->
            <div id="form-login-container" class="auth-form active">
                <!-- Error message -->
                <div id="login-error" class="auth-error">
                    <i data-lucide="alert-circle"></i>
                    <span class="error-text"></span>
                </div>

                <form id="form-login">
                    <div class="login-form-group">
                        <label for="login-email">Email</label>
                        <div class="login-input-wrapper">
                            <input type="email" id="login-email" class="login-input" placeholder="tu@email.com" required
                                autocomplete="email">
                            <i data-lucide="mail"></i>
                        </div>
                    </div>

                    <div class="login-form-group">
                        <label for="login-password">Contraseña</label>
                        <div class="login-input-wrapper">
                            <input type="password" id="login-password" class="login-input" placeholder="••••••••"
                                required autocomplete="current-password">
                            <i data-lucide="lock"></i>
                            <button type="button" class="password-toggle">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        <span class="spinner"></span>
                        <span class="btn-text">Iniciar Sesión</span>
                    </button>
                </form>

                <div class="auth-divider">
                    <span>o continuar con</span>
                </div>

                <button type="button" class="btn-google">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Google
                </button>
            </div>

            <!-- ========== REGISTER FORM ========== -->
            <div id="form-register-container" class="auth-form">
                <!-- Error message -->
                <div id="register-error" class="auth-error">
                    <i data-lucide="alert-circle"></i>
                    <span class="error-text"></span>
                </div>

                <form id="form-register">
                    <div class="login-form-group">
                        <label for="register-nombre">Nombre completo</label>
                        <div class="login-input-wrapper">
                            <input type="text" id="register-nombre" class="login-input" placeholder="Tu nombre" required
                                autocomplete="name">
                            <i data-lucide="user"></i>
                        </div>
                    </div>

                    <div class="login-form-group">
                        <label for="register-email">Email</label>
                        <div class="login-input-wrapper">
                            <input type="email" id="register-email" class="login-input" placeholder="tu@email.com"
                                required autocomplete="email">
                            <i data-lucide="mail"></i>
                        </div>
                    </div>

                    <div class="login-form-group">
                        <label for="register-password">Contraseña</label>
                        <div class="login-input-wrapper">
                            <input type="password" id="register-password" class="login-input"
                                placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
                            <i data-lucide="lock"></i>
                            <button type="button" class="password-toggle">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="login-form-group">
                        <label for="register-password-confirm">Confirmar contraseña</label>
                        <div class="login-input-wrapper">
                            <input type="password" id="register-password-confirm" class="login-input"
                                placeholder="Repetí tu contraseña" required minlength="6" autocomplete="new-password">
                            <i data-lucide="shield-check"></i>
                            <button type="button" class="password-toggle">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        <span class="spinner"></span>
                        <span class="btn-text">Crear Cuenta</span>
                    </button>
                </form>

                <div class="auth-divider">
                    <span>o continuar con</span>
                </div>

                <button type="button" class="btn-google">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Google
                </button>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="js/auth.js"></script>
</body>

</html>
